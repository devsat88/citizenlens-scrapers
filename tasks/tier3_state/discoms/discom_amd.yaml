category: streetlights
cities:
- AMD
description: Streetlight data from electricity provider Torrent Power
fetch:
  method: GET
  type: html
  url: https://www.torrentpower.com/
load:
  table: streetlight_projects
  unique_key:
  - city_code
  - project_name
  - source_portal
  upload_raw: true
  upsert: true
name: DISCOM Torrent Power
parse:
  columns: {}
  type: html_table
refresh_frequency: quarterly
tier: 3
transform:
  _add_fields:
    category: streetlights
    source_portal: discom_amd
validate:
  required: []
