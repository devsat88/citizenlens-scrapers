category: streetlights
cities:
- HYD
description: Streetlight data from electricity provider TSSPDCL
fetch:
  method: GET
  type: html
  url: https://tsspdcl.cgg.gov.in/
load:
  table: streetlight_projects
  unique_key:
  - city_code
  - project_name
  - source_portal
  upload_raw: true
  upsert: true
name: DISCOM TSSPDCL
parse:
  columns: {}
  type: html_table
refresh_frequency: quarterly
tier: 3
transform:
  _add_fields:
    category: streetlights
    source_portal: discom_hyd
validate:
  required: []
