category: streetlights
cities:
- DEL
description: Streetlight data from electricity provider BSES Rajdhani
fetch:
  method: GET
  type: html
  url: https://www.bsesdelhi.com/
load:
  table: streetlight_projects
  unique_key:
  - city_code
  - project_name
  - source_portal
  upload_raw: true
  upsert: true
name: DISCOM BSES Rajdhani
parse:
  columns: {}
  type: html_table
refresh_frequency: quarterly
tier: 3
transform:
  _add_fields:
    category: streetlights
    source_portal: discom_del
validate:
  required: []
