category: water
cities:
- DEL
description: Water board projects and quality data for DEL
fetch:
  method: GET
  type: html
  url: https://delhijalboard.delhi.gov.in/
load:
  table: water_projects
  unique_key:
  - city_code
  - project_name
  - source_portal
  upload_raw: true
  upsert: true
name: Water Board DEL
parse:
  columns: {}
  type: html_table
refresh_frequency: monthly
tier: 3
transform:
  _add_fields:
    category: water
    source_portal: water_board_del
validate:
  required: []
