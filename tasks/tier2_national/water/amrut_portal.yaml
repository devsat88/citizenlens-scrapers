category: water
cities: all
description: Urban water supply & sewerage projects
fetch:
  method: GET
  type: html
  url: https://amrut.gov.in/
load:
  table: water_projects
  unique_key:
  - city_code
  - project_name
  - source_portal
  upload_raw: true
  upsert: true
name: Amrut Portal
parse:
  columns: {}
  type: html_table
refresh_frequency: quarterly
tier: 2
transform:
  _add_fields:
    category: water
    source_portal: amrut_portal
validate:
  required: []
