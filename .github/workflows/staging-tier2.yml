name: Staging — Tier 2

on:
  workflow_dispatch:

jobs:
  staging-tier2:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        category: [roads, garbage, water, railways, streetlights, cross_category]

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tier 2 — ${{ matrix.category }}
        run: python run_tier.py --tier 2 --category ${{ matrix.category }} --mode staging --parallel 3

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-tier2-logs-${{ matrix.category }}
          path: logs/
          retention-days: 30
