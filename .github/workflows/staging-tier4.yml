name: Staging — Tier 4

on:
  workflow_dispatch:

jobs:
  staging-tier4:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        city: [MUM, DEL, BLR, CHN, HYD, PUN, KOL, AMD, TVM, KCH]

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tier 4 — ${{ matrix.city }}
        run: python run_tier.py --tier 4 --city ${{ matrix.city }} --mode staging --parallel 2

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-tier4-logs-${{ matrix.city }}
          path: logs/
          retention-days: 30
